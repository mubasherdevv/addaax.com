<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"
     viewBox="0 0 600 130" preserveAspectRatio="xMaxYMin slice"
     style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;">

  <defs>

    <!-- Rich Premium Gold Gradient for diagonal wash -->
    <linearGradient id="goldWash" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#856404" stop-opacity="0"/>
      <stop offset="60%" stop-color="#D4AF37" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.22"/>
    </linearGradient>

    <!-- Animated top border line gradient - Metallic Gold -->
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8860B" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B8860B" stop-opacity="0.3"/>
      <animate attributeName="x1" values="0%;-100%;0%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Featured badge gradient - Premium Metallic -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
      <animate attributeName="x1" values="0%;-100%;0%" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="2s" repeatCount="indefinite"/>
    </linearGradient>

  </defs>

  <!-- Diagonal gold wash — right ~55% of card -->
  <polygon
    points="350,0 600,0 600,130 330,130"
    fill="url(#goldWash)" />

  <!-- Top animated gold border -->
  <rect x="0" y="0" width="600" height="0.8" fill="url(#topLine)">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Shimmer sweep across full card -->
  <rect x="-80" y="0" width="60" height="130"
        fill="white" opacity="0.01"
        transform="skewX(-18)">
    <animate attributeName="x" from="-80" to="660" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- FEATURED pill badge — top right (Small-Medium Size) -->
  <g>
    <rect x="525" y="10" width="65" height="18" rx="9" fill="url(#badgeGrad)"/>
    <!-- badge shine sweep -->
    <rect x="525" y="10" width="20" height="18" rx="9" fill="white" opacity="0.2" transform="skewX(-18)">
      <animate attributeName="x" from="510" to="610" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <text
      x="557.5" y="22"
      text-anchor="middle"
      fill="#000"
      font-size="8"
      font-family="sans-serif"
      font-weight="900"
      letter-spacing="0.5">FEATURED</text>
  </g>

</svg>
